services:
  postgres:
    image: postgres:16
    ports:
      - "5555:5432"
    environment:
      POSTGRES_USER: tokenscope
      POSTGRES_PASSWORD: tokenscope
      POSTGRES_DB: tokenscope
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokenscope"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: node:24-alpine
    working_dir: /app/packages/shared
    command: sh -c "npm install && npm run migrate:up"
    environment:
      - DATABASE_URL=postgresql://tokenscope:tokenscope@postgres:5432/tokenscope
    volumes:
      - ./packages/shared:/app/packages/shared
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  redis:
    image: redis:7
    ports:
      - "6666:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9093,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  indexer:
    build:
      context: .
      dockerfile: packages/indexer/Dockerfile
    environment:
      - DATABASE_URL=postgresql://tokenscope:tokenscope@postgres:5432/tokenscope
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9093
      - ALCHEMY_RPC=${ALCHEMY_RPC}
      - CHAIN_ID=${CHAIN_ID:-1}
      - START_BLOCK=${START_BLOCK:-0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    expose:
      - "9100" #metrics
    ports:
      - "4000:4000" #API
    environment:
      - DATABASE_URL=postgresql://tokenscope:tokenscope@postgres:5432/tokenscope
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9093
      - ALCHEMY_RPC=${ALCHEMY_RPC}
      - PORT=4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
   
  prometheus:
    image: prom/prometheus
    expose:
    - "9090"
    volumes:
    - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"       
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PWD}   
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  grafana_data: